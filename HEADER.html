<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDUVA Header</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#111061;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 50px;
    background:#f4f3ee;
}

.logo{
    font-size:42px;
    font-weight:300;
    letter-spacing:15px;
    color:#7b7b7b;
}

nav{
    display:flex;
    gap:45px;
}

nav a{
    text-decoration:none;
    color:#4d5d6c;
    font-size:18px;
    position:relative;
}

nav a.active::after{
    content:'';
    position:absolute;
    width:100%;
    height:4px;
    background:#4d5d6c;
    left:0;
    bottom:-25px;
}

.apply-btn{
    background:#111061;
    color:white;
    text-decoration:none;
    padding:20px 45px;
    font-size:18px;
    font-weight:500;
    transition:.3s;
}

.apply-btn:hover{
    background:#111061;
}
</style>
</head>

    
</html>
